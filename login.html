<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - MarketHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="index.html" class="logo-link">🛍️ MarketHub</a>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">Home</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <section class="auth-section">
        <div class="auth-container">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <p class="auth-subtitle">Welcome back to MarketHub</p>

                <form id="loginFormElement">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-large btn-primary">Login</button>

                    <div id="loginError" class="error-message" style="display:none;"></div>
                    <div id="loginSuccess" class="success-message" style="display:none;"></div>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="#" id="switchToRegister" class="auth-link">Register here</a></p>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join MarketHub today</p>

                <form id="registerFormElement">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="registerName" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="registerEmail" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" name="password" required placeholder="••••••••">
                        <small>At least 8 characters recommended</small>
                    </div>

                    <div class="form-group">
                        <label>Account Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="role" value="customer" checked> Customer
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="role" value="vendor"> Vendor
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="role" value="admin"> Admin
                            </label>
                        </div>
                    </div>

                    <!-- Vendor Details (hidden by default) -->
                    <div id="vendorDetails" style="display:none;">
                        <hr>
                        <h4>Vendor Information</h4>
                        <div class="form-group">
                            <label>Store Name</label>
                            <input type="text" id="storeName" placeholder="Your Store Name">
                        </div>
                        <div class="form-group">
                            <label>Store Description</label>
                            <textarea id="storeDescription" placeholder="Describe your store..." rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Store Logo URL</label>
                            <input type="url" id="storeLogo" placeholder="https://example.com/logo.png">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-large btn-primary">Create Account</button>

                    <div id="registerError" class="error-message" style="display:none;"></div>
                    <div id="registerSuccess" class="success-message" style="display:none;"></div>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="#" id="switchToLogin" class="auth-link">Login here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MarketHub. All rights reserved. | Multi-Vendor Marketplace</p>
        </div>
    </footer>

    <script src="auth.js"></script>
</body>
</html>
